# Nextcloud per-client single-tenant VM — turnkey stack.
#
#   app       -> Nextcloud (apache flavour: it serves HTTP itself, no separate fpm+nginx).
#                The ONLY thing the customer ever logs into. Internal network only.
#   cron      -> the same image running /cron.sh. Nextcloud's background jobs (file scans,
#                previews, notifications) do NOT run without it; the admin UI nags forever.
#   db        -> PostgreSQL. Internal only, never published.
#   redis     -> file locking + cache. Nextcloud without it corrupts concurrent edits.
#   collabora -> Collabora Online (CODE) = "Nextcloud Office". Internal only, fronted by caddy.
#   caddy     -> TLS terminator, the ONLY internet-facing service. 80 (ACME) + 443.
#
# NETWORK MODEL: only caddy publishes ports. db/redis/collabora/app are unreachable from
# off-box; they talk over the internal `nc` bridge.
#
# PINNING: every image is major-tag + digest. This appliance is handed to a customer who
# never runs docker themselves, so there is no operator to fix a boot that a moved tag broke.
# Two of these are not just hygiene:
#   * postgres — the official image does NOT run pg_upgrade. If the tag ever rolled 18 -> 19
#     the container would refuse to start against an existing 18 datadir and the customer's
#     VM would be dead with nobody to repair it.
#   * nextcloud — Nextcloud refuses to skip a major on upgrade, so a tag that jumped 33 -> 35
#     leaves an unrepairable install.
# Re-bake by bumping the digest here, never by floating the tag.
#
# WHY 33 AND NOT 34: 34.0.1 exists, but Nextcloud's own `stable` AND `production` channels
# still resolve to 33.0.6 (checked 2026-07-16, five weeks after 34.0.0). We ship what the
# vendor itself calls production.

x-restart: &restart unless-stopped

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:18@sha256:c2d42a104eb6b37b286a2d9c5cf83f349de4d6516d513d00a2bd9610e2c2e5e4
    container_name: nextcloud-db
    restart: *restart
    networks: [nc]
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${DB_PASSWORD}   # generated by firstboot.sh, never shipped
      # Nextcloud wants a deterministic collation; let initdb pick C.UTF-8 explicitly.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    volumes:
      # /var/lib/postgresql, NOT /var/lib/postgresql/data. PostgreSQL 18 moved: PGDATA is now
      # /var/lib/postgresql/18/docker and the image's VOLUME is /var/lib/postgresql. The old
      # path is not merely wrong, the entrypoint HUNTS for it: it finds a mount at
      # /var/lib/postgresql/data with no PG_VERSION, calls docker_error_old_databases and
      # exits 1. The db would crash-loop, `app` waits on service_healthy and never starts,
      # and the VM never becomes a Nextcloud at all.
      - db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud -d nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt: [no-new-privileges:true]
    logging: *logging

  redis:
    image: redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    container_name: nextcloud-redis
    restart: *restart
    networks: [nc]
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "60", "1"]
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    security_opt: [no-new-privileges:true]
    logging: *logging

  app:
    image: nextcloud:33-apache@sha256:73280a6f559e9a6c96e012324086ff63af7ccfbed260f71f17738e5494375052
    container_name: nextcloud-app
    restart: *restart
    networks: [nc]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
      # Admin account. Read ONLY on the very first start against an empty volume; on every
      # later start the image sees an installed instance and ignores them. Changing the
      # password here later does NOTHING - use occ.
      NEXTCLOUD_ADMIN_USER: ${NC_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NC_DOMAIN}
      # Behind a TLS-terminating proxy Nextcloud otherwise generates http:// links and
      # breaks the office iframe, share links and mobile clients.
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: ${NC_DOMAIN}
      OVERWRITECLIURL: https://${NC_DOMAIN}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-172.16.0.0/12}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      PHP_UPLOAD_LIMIT: ${PHP_UPLOAD_LIMIT:-10G}
    volumes:
      - nextcloud:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(0);'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    security_opt: [no-new-privileges:true]
    logging: *logging

  cron:
    image: nextcloud:33-apache@sha256:73280a6f559e9a6c96e012324086ff63af7ccfbed260f71f17738e5494375052
    container_name: nextcloud-cron
    restart: *restart
    networks: [nc]
    depends_on:
      db: {condition: service_healthy}
    # /cron.sh ships in the image and loops `php cron.php` every 5 min. Without this
    # container Nextcloud falls back to AJAX cron and the admin overview complains forever.
    entrypoint: /cron.sh
    volumes:
      - nextcloud:/var/www/html
    security_opt: [no-new-privileges:true]
    logging: *logging

  collabora:
    image: collabora/code:26.04.2.1.1@sha256:fece3a479b4ca57e7186d0c715155526170e337deef55bbbbbc79ee93b0e72e1
    container_name: nextcloud-collabora
    restart: *restart
    networks: [nc]
    environment:
      # aliasgroup1 = the Nextcloud origin Collabora will accept WOPI requests from.
      # NOTE: the old `domain` env var (the escaped-dot regex every blog post shows) is DEAD
      # in current CODE - coolwsd reads only aliasgroup1..N, username, password, server_name,
      # dictionaries, remoteconfigurl, content_security_policy. Setting `domain` is silently
      # ignored and leaves Collabora in trust-on-first-use.
      aliasgroup1: "https://${NC_DOMAIN}:443"
      server_name: "${NC_DOMAIN}"
      username: ${COLLABORA_ADMIN_USER:-admin}
      password: ${COLLABORA_ADMIN_PASSWORD}
      DONT_GEN_SSL_CERT: "true"
      # ssl.enable=false  -> caddy terminates TLS, collabora speaks plain HTTP inward
      # ssl.termination=true -> but still generate https:// URLs
      # net.service_root=/office -> serve every URL under /office so Nextcloud and the office
      #   can share ONE hostname. This is a documented coolwsd option, not a hack: coolwsd
      #   strips the prefix from inbound requests and injects it into discovery + assets.
      extra_params: --o:ssl.enable=false --o:ssl.termination=true --o:net.service_root=/office --o:logging.level=warning
    cap_add: [MKNOD]
    security_opt: [no-new-privileges:true]
    logging: *logging

  caddy:
    image: caddy:2.11-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    container_name: nextcloud-caddy
    restart: *restart
    depends_on: [app, collabora]
    environment:
      NC_DOMAIN: "${NC_DOMAIN}"
    ports:
      - "80:80"     # ACME HTTP-01 + the http -> https redirect Caddy does for free
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # holds the LE account + certs; renewal is automatic
      - caddy_config:/config
    networks: [nc]
    security_opt: [no-new-privileges:true]
    cap_add: [NET_BIND_SERVICE]
    logging: *logging

networks:
  nc:
    driver: bridge

volumes:
  db:
  redis:
  nextcloud:
  caddy_data:
  caddy_config:
